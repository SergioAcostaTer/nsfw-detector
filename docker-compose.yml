version: '3.8'

services:
  scanner:
    build: .
    container_name: nsfw_scanner
    volumes:
      - .:/app
      - /path/to/your/images/on/host:/target_images # UPDATE THIS
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu] # Enables GPU if available

  gui:
    build: .
    container_name: nsfw_gui
    command: streamlit run app/gui.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - scanner
